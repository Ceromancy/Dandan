    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dandân</title>
    <link rel="icon" type="image/png" href="dandan.png">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="container">
        <h1>Leave your distractions at the shore.</h1>
        <div class="timer-display">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
        <audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>
        <div class="tracker-container">
            <h3>Session Progress</h3>
            <div class="graph">
                <div class="bar-group">
                    <div class="bar focus-bar" id="focus-bar">
                        <span class="bar-count" id="focus-count">0</span>
                    </div>
                    <span class="bar-label">Focus Blocks</span>
                </div>
                <div class="bar-group">
                    <div class="bar break-bar" id="break-bar">
                        <span class="bar-count" id="break-count">0</span>
                    </div>
                    <span class="bar-label">Breaks</span>
                </div>
            </div>
            <p id="progress-summary">Today's progress: 0 focus, 0 breaks</p>
        </div>
        <div class="coffee-container">
            <a href="https://www.buymeacoffee.com/ceromancy" target="_blank">
            <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height: 40px !important; width: 145px !important;">
            </a>
        </div>
        </div>

</body>
