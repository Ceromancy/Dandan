<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dandan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            transition: background-color 0.5s ease;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .timer-display {
            font-size: 6rem;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
        }
        .modes {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }
        .mode-btn {
            background-color: #e0e0e0;
        }
        .mode-btn.active {
            background-color: #ff6b6b;
            color: white;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .main-btn {
            background-color: #4caf50;
            color: white;
            font-weight: bold;
            width: 100px;
        }
        .reset-btn {
            background-color: #9e9e9e;
            color: white;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="modes">
            <button class="mode-btn active" onclick="setMode('pomodoro')">Pomodoro</button>
            <button class="mode-btn" onclick="setMode('shortBreak')">Short Break</button>
            <button class="mode-btn" onclick="setMode('longBreak')">Long Break</button>
        </div>
        <div class="timer-display" id="timer">25:00</div>
        <div class="controls">
            <button class="main-btn" id="startBtn" onclick="toggleTimer()">START</button>
            <button class="reset-btn" onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <script>
        let timeLeft;
        let timerId = null;
        let currentMode = 'pomodoro';

        const modes = {
            pomodoro: 25 * 60,
            shortBreak: 5 * 60,
            longBreak: 15 * 60
        };

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;
            document.title = `${display} - Pomodoro`;
        }

        function setMode(mode) {
            currentMode = mode;
            timeLeft = modes[mode];
            
            // Update UI
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase().replace(' ', '') === mode.toLowerCase()) {
                    btn.classList.add('active');
                }
            });

            const colors = {
                pomodoro: '#f0f2f5',
                shortBreak: '#e1f5fe',
                longBreak: '#e8f5e9'
            };
            document.body.style.backgroundColor = colors[mode];
            
            pauseTimer();
            updateDisplay();
        }

        // Initialize
        setMode('pomodoro');
    </script>
</body>
</html>
